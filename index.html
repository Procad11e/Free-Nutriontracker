<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kalorien Tracker (German DB)</title>
    <style>
        :root {
            --primary: #4CAF50;
            --bg: #121212;
            --surface: #1e1e1e;
            --text: #ffffff;
            --text-sec: #aaaaaa;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }
        h1, h2 { text-align: center; margin-top: 0; }
        .card {
            background-color: var(--surface);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        input[type="text"], input[type="number"], input[type="password"] {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 6px;
            border: 1px solid #333;
            background-color: #2c2c2c;
            color: white;
            box-sizing: border-box;
        }
        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            margin-bottom: 10px;
        }
        button.mic-btn { background-color: #2196F3; }
        .progress-container {
            background-color: #333;
            border-radius: 10px;
            height: 24px;
            width: 100%;
            overflow: hidden;
            margin-top: 10px;
        }
        .progress-bar {
            background-color: var(--primary);
            height: 100%;
            width: 0%;
            transition: width 0.3s;
        }
        .stats { display: flex; justify-content: space-between; margin-top: 5px; font-size: 0.9em; }
        .log-list { list-style: none; padding: 0; }
        .log-item {
            background-color: #2c2c2c;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 10px;
            border-left: 4px solid var(--primary);
        }
        .log-time { font-size: 0.8em; color: var(--text-sec); }
        .hidden { display: none; }
        #loading { text-align: center; color: var(--primary); font-weight: bold; }
    </style>
</head>
<body>

    <h1>Tracker</h1>

    <div class="card">
        <h2>Einstellungen</h2>
        <label>Dein Gemini API Schlüssel:</label>
        <input type="password" id="apiKey" placeholder="AIzaSy...">
        <label>Tagesziel (kcal):</label>
        <input type="number" id="kcalGoal" value="2000">
        <button onclick="saveSettings()">Speichern</button>
    </div>

    <div class="card">
        <h2>Heute</h2>
        <div class="progress-container">
            <div class="progress-bar" id="kcalBar"></div>
        </div>
        <div class="stats">
            <span id="kcalConsumed">0 kcal gegessen</span>
            <span id="kcalRemaining">2000 kcal übrig</span>
        </div>
    </div>

    <div class="card">
        <h2>Mahlzeit hinzufügen</h2>
        <input type="text" id="foodInput" placeholder="Z.B. 3 Eier und 4 Toastbrot">
        <button class="mic-btn" onclick="startDictation()">🎤 Sprechen</button>
        <button onclick="analyzeFood()">Berechnen & Speichern</button>
        <div id="loading" class="hidden">Ki berechnet Nährwerte... ⏳</div>
    </div>

    <div class="card">
        <h2>Verlauf</h2>
        <ul class="log-list" id="logList"></ul>
    </div>

    <script>
        // Lokale Speicher-Schlüssel
        const STORAGE_KEY = 'foodLogs';
        const SETTINGS_KEY = 'appSettings';
        
        let logs = [];
        let settings = { apiKey: '', kcalGoal: 2000 };

        // App Initialisierung
        function init() {
            const savedSettings = JSON.parse(localStorage.getItem(SETTINGS_KEY));
            if (savedSettings) {
                settings = savedSettings;
                document.getElementById('apiKey').value = settings.apiKey;
                document.getElementById('kcalGoal').value = settings.kcalGoal;
            }

            const savedData = JSON.parse(localStorage.getItem(STORAGE_KEY));
            const today = new Date().toLocaleDateString();

            if (savedData && savedData.date === today) {
                logs = savedData.logs;
            } else {
                // Neuer Tag, alte Daten löschen
                logs = [];
                saveData();
            }
            updateUI();
        }

        function saveSettings() {
            settings.apiKey = document.getElementById('apiKey').value;
            settings.kcalGoal = parseInt(document.getElementById('kcalGoal').value) || 2000;
            localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings));
            updateUI();
            alert('Einstellungen gespeichert!');
        }

        function saveData() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify({
                date: new Date().toLocaleDateString(),
                logs: logs
            }));
        }

        function updateUI() {
            const list = document.getElementById('logList');
            list.innerHTML = '';
            let totalKcal = 0;

            logs.forEach(log => {
                totalKcal += log.kcal;
                const li = document.createElement('li');
                li.className = 'log-item';
                li.innerHTML = `
                    <div><strong>${log.food}</strong> (${log.kcal} kcal)</div>
                    <div class="log-time">${log.time}</div>
                `;
                list.appendChild(li);
            });

            const goal = settings.kcalGoal;
            const remaining = goal - totalKcal;
            let percentage = (totalKcal / goal) * 100;
            if (percentage > 100) percentage = 100;

            document.getElementById('kcalBar').style.width = percentage + '%';
            document.getElementById('kcalConsumed').innerText = `${totalKcal} kcal gegessen`;
            document.getElementById('kcalRemaining').innerText = `${remaining} kcal übrig`;
        }

        // Web Speech API
        function startDictation() {
            if (window.hasOwnProperty('webkitSpeechRecognition') || window.hasOwnProperty('SpeechRecognition')) {
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                const recognition = new SpeechRecognition();
                recognition.lang = 'de-DE';
                recognition.interimResults = false;
                recognition.maxAlternatives = 1;

                recognition.onresult = function(event) {
                    document.getElementById('foodInput').value = event.results[0][0].transcript;
                };

                recognition.onerror = function(event) {
                    alert('Spracherkennung fehlgeschlagen: ' + event.error);
                };

                recognition.start();
            } else {
                alert('Dein Browser unterstützt leider keine Spracherkennung.');
            }
        }

        // KI Berechnung (Gemini API Call)
        async function analyzeFood() {
            const input = document.getElementById('foodInput').value;
            if (!input) return alert('Bitte etwas eingeben!');
            if (!settings.apiKey) return alert('Bitte zuerst den API Key in den Einstellungen speichern!');

            document.getElementById('loading').classList.remove('hidden');

            const prompt = `Du bist ein Ernährungsexperte. Analysiere das folgende Essen basierend auf deutschen Supermarktdaten (Aldi, Lidl, Rewe) und Datenbanken. Gib NUR ein gültiges JSON-Objekt zurück, das so aussieht: {"food": "Kurzbeschreibung", "kcal": Zahlenwert}. Keine Formatierung, keine Backticks. Das Essen: "${input}"`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${settings.apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }]
                    })
                });

                const data = await response.json();
                if (data.error) throw new Error(data.error.message);

                let textResponse = data.candidates[0].content.parts[0].text;
                // Entferne eventuelle Markdown-Backticks falls die KI sich nicht an die Vorgabe hält
                textResponse = textResponse.replace(/```json/g, '').replace(/```/g, '').trim();
                
                const result = JSON.parse(textResponse);

                logs.unshift({
                    food: result.food,
                    kcal: result.kcal,
                    time: new Date().toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' })
                });

                document.getElementById('foodInput').value = '';
                saveData();
                updateUI();

            } catch (error) {
                console.error(error);
                alert('Fehler bei der Berechnung: ' + error.message);
            } finally {
                document.getElementById('loading').classList.add('hidden');
            }
        }

        // Starte App
        init();
    </script>
</body>
</html>
